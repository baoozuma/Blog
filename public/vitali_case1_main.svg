<svg width="680" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Vitali Case 1 — three equal balls, B(z,5r₂) centered at z</title>
<desc>B(x,r), B(y,r₁), B(z,r₂) equal radius, externally tangent in a row. B(z,5r₂) centered at z covers B(x,r) exactly.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .ts { font-size: 12px; fill: #5F5E5A; }
    .th { font-size: 14px; font-weight: 500; }
  </style>
</defs>

<!-- B(z, 5r₂): center z=340, radius=200 -->
<circle cx="340" cy="160" r="200" fill="none" stroke="#1D9E75" stroke-width="1.3" stroke-dasharray="6 4" opacity="0.75"/>
<!-- B(x, r): center 180, r=40 -->
<circle cx="180" cy="160" r="40" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.3" opacity="0.7"/>
<!-- B(y, r₁): center 260, r=40 -->
<circle cx="260" cy="160" r="40" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.3" opacity="0.7"/>
<!-- B(z, r₂): center 340, r=40 -->
<circle cx="340" cy="160" r="40" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.3" opacity="0.7"/>

<!-- tangency points -->
<circle cx="220" cy="160" r="2.5" fill="#888780"/>
<circle cx="300" cy="160" r="2.5" fill="#888780"/>

<!-- centers -->
<circle cx="180" cy="160" r="3.5" fill="#185FA5"/>
<circle cx="260" cy="160" r="3.5" fill="#BA7517"/>
<circle cx="340" cy="160" r="3.5" fill="#3B6D11"/>
<text class="ts" x="180" y="178" text-anchor="middle" fill="#185FA5">x</text>
<text class="ts" x="260" y="178" text-anchor="middle" fill="#BA7517">y</text>
<text class="ts" x="340" y="178" text-anchor="middle" fill="#3B6D11">z</text>

<!-- ball labels -->
<text class="th" x="180" y="108" text-anchor="middle" fill="#185FA5">B(x, r)</text>
<text class="th" x="260" y="108" text-anchor="middle" fill="#BA7517">B(y, r₁)</text>
<text class="th" x="340" y="108" text-anchor="middle" fill="#3B6D11">B(z, r₂)</text>
<text class="th" x="555" y="55" text-anchor="start" fill="#1D9E75">B(z, 5r₂)</text>
<line x1="553" y1="57" x2="530" y2="72" stroke="#1D9E75" stroke-width="0.6" stroke-dasharray="3 2"/>

<!-- radius r₂ -->
<line x1="340" y1="143" x2="380" y2="143" stroke="#3B6D11" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="362" y="135" text-anchor="middle" fill="#3B6D11">r₂</text>
<!-- 5r₂ -->
<line x1="340" y1="128" x2="140" y2="128" stroke="#1D9E75" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text class="ts" x="238" y="120" text-anchor="middle" fill="#1D9E75">5r₂</text>

<!-- brace d(z,x) -->
<line x1="180" y1="215" x2="340" y2="215" stroke="#888780" stroke-width="0.8"/>
<line x1="180" y1="210" x2="180" y2="220" stroke="#888780" stroke-width="0.8"/>
<line x1="340" y1="210" x2="340" y2="220" stroke="#888780" stroke-width="0.8"/>
<text class="ts" x="260" y="233" text-anchor="middle">d(z, x) = 4r₂</text>

<!-- divider -->
<line x1="60" y1="410" x2="620" y2="410" stroke="#D3D1C7" stroke-width="0.6"/>

<!-- caption far below -->
<text class="ts" x="340" y="440" text-anchor="middle">r = r₁ = r₂. Three equal balls tangent in a row.</text>
<text class="ts" x="340" y="462" text-anchor="middle">d(z, x) = 4r₂, so d(t, z) ≤ 4r₂ + r = 5r₂ for all t ∈ B(x, r).</text>
<text class="ts" x="340" y="484" text-anchor="middle">Left edge of B(x, r) = left edge of B(z, 5r₂) = z − 5r₂. Tight fit.</text>
</svg>
