<svg width="680" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Vitali subcase 1 — extreme case r = 2r₁</title>
<desc>B(x,r) and B(y,r₁) are externally tangent with r = 2r₁. B(y,5r₁) centered at y covers B(x,r) exactly.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .ts { font-size: 12px; fill: #5F5E5A; }
    .th { font-size: 14px; font-weight: 500; }
  </style>
</defs>

<!-- B(y, 5r₁): center y=420, radius=200 -->
<circle cx="420" cy="170" r="200" fill="none" stroke="#1D9E75" stroke-width="1.3" stroke-dasharray="6 4" opacity="0.8"/>
<!-- B(x, r): center x=300, radius=80 -->
<circle cx="300" cy="170" r="80" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.3" opacity="0.7"/>
<!-- B(y, r₁): center y=420, radius=40 -->
<circle cx="420" cy="170" r="40" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.3" opacity="0.8"/>

<!-- tangency point -->
<circle cx="380" cy="170" r="3" fill="#888780"/>
<text class="ts" x="380" y="158" text-anchor="middle">tangent</text>

<!-- centers -->
<circle cx="300" cy="170" r="3.5" fill="#185FA5"/>
<text class="ts" x="300" y="188" text-anchor="middle" fill="#185FA5">x</text>
<circle cx="420" cy="170" r="3.5" fill="#BA7517"/>
<text class="ts" x="420" y="188" text-anchor="middle" fill="#BA7517">y</text>

<!-- radius r -->
<line x1="300" y1="155" x2="220" y2="155" stroke="#378ADD" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="258" y="148" text-anchor="middle" fill="#185FA5">r = 2r₁</text>
<!-- radius r₁ -->
<line x1="420" y1="155" x2="460" y2="155" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="443" y="148" text-anchor="middle" fill="#BA7517">r₁</text>
<!-- 5r₁ -->
<line x1="420" y1="140" x2="220" y2="140" stroke="#1D9E75" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text class="ts" x="318" y="132" text-anchor="middle" fill="#1D9E75">5r₁</text>

<!-- ball labels -->
<text class="th" x="268" y="105" text-anchor="middle" fill="#185FA5">B(x, r)</text>
<text class="th" x="420" y="115" text-anchor="middle" fill="#BA7517">B(y, r₁)</text>
<text class="th" x="88" y="55" text-anchor="start" fill="#1D9E75">B(y, 5r₁)</text>
<line x1="160" y1="58" x2="228" y2="85" stroke="#1D9E75" stroke-width="0.6" stroke-dasharray="3 2"/>

<!-- divider -->
<line x1="60" y1="410" x2="620" y2="410" stroke="#D3D1C7" stroke-width="0.6"/>

<!-- caption far below -->
<text class="ts" x="340" y="440" text-anchor="middle">Extreme case: r = 2r₁, externally tangent at one point.</text>
<text class="ts" x="340" y="462" text-anchor="middle">Left edge of B(x,r) = left edge of B(y,5r₁) = y − 5r₁. Tight fit.</text>
<text class="ts" x="340" y="484" text-anchor="middle">d(t, y) ≤ r + (r + r₁) = 4r₁ + r₁ = 5r₁ for all t ∈ B(x, r).</text>
</svg>
